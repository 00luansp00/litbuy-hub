name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-validation:
    name: Frontend validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint frontend
        run: bun run lint:auth

      - name: Check frontend auth formatting
        run: bun run format:check:auth

      - name: Test frontend
        run: bun run test

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Build frontend
        run: bun run build
        env:
          VITE_API_BASE_URL: http://localhost:3001/api/v1
          VITE_CURRENT_TERMS_VERSION: 2026-07-14
          VITE_CURRENT_PRIVACY_VERSION: 2026-07-14
          VITE_ENABLE_DEMO_ROLES: "false"

  backend-validation:
    name: Backend validation
    runs-on: ubuntu-24.04
    env:
      NODE_ENV: test
      PORT: "3001"
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://litbuy:litbuy_local_validation@localhost:5432/litbuy_validation?schema=public
      REDIS_URL: redis://localhost:6379
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: silent
      SWAGGER_ENABLED: "false"
      TRUST_PROXY: "false"
      SERVER_REQUEST_TIMEOUT_MS: "60000"
      AUTH_ACCESS_TOKEN_SECRET: test_long_access_secret_for_ci_only
      AUTH_ACCESS_TOKEN_TTL_SECONDS: "600"
      AUTH_REFRESH_TOKEN_TTL_DAYS: "30"
      AUTH_REFRESH_TOKEN_PEPPER: test_long_refresh_pepper
      AUTH_VERIFICATION_TOKEN_PEPPER: test_long_verification_pepper
      AUTH_DEVICE_TOKEN_PEPPER: test_long_device_pepper
      AUTH_CSRF_TOKEN_PEPPER: test_long_csrf_pepper
      AUTH_IP_HASH_PEPPER: test_long_ip_hash_pepper
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: "30"
      AUTH_DEVICE_APPROVAL_TTL_MINUTES: "30"
      AUTH_MAX_ATTEMPTS: "5"
      AUTH_LOGIN_LOCK_MINUTES: "15"
      AUTH_REFRESH_COOKIE_NAME: litbuy_refresh
      AUTH_DEVICE_COOKIE_NAME: litbuy_device
      AUTH_CSRF_COOKIE_NAME: litbuy_csrf
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_COOKIE_DOMAIN: ""
      AUTH_EMAIL_DELIVERY_MODE: memory
      AUTH_2FA_RECOVERY_PEPPER: test_long_2fa_recovery_pepper_32_chars
      AUTH_STEP_UP_TOKEN_PEPPER: test_long_step_up_token_pepper_32_chars
      AUTH_PASSWORD_RESET_TTL_MINUTES: "30"
      AUTH_SMS_DELIVERY_MODE: memory
      AUTH_PHONE_VERIFICATION_TTL_MINUTES: "10"
      AUTH_PHONE_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_EMAIL_CHANGE_TTL_MINUTES: "30"
      AUTH_SENSITIVE_CHANGE_HOLD_HOURS: "48"
      AUTH_2FA_CODE_TTL_MINUTES: "10"
      AUTH_2FA_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_2FA_MAX_ATTEMPTS: "5"
      AUTH_2FA_RECOVERY_CODE_COUNT: "10"
      AUTH_STEP_UP_GRANT_TTL_MINUTES: "10"
      AUTH_STEP_UP_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_STEP_UP_MAX_ATTEMPTS: "5"
      CURRENT_TERMS_VERSION: "2026-test"
      CURRENT_PRIVACY_VERSION: "2026-test"
      CURRENT_SELLER_AGREEMENT_VERSION: "2026-test"
      PUBLIC_FRONTEND_ORIGIN: http://localhost:3000
      PUBLIC_API_ORIGIN: http://localhost:3001
      AUTH_COOKIE_TOPOLOGY: same-host
      PRODUCT_IMAGE_S3_ENDPOINT: http://localhost:9000
      PRODUCT_IMAGE_S3_REGION: us-east-1
      PRODUCT_IMAGE_S3_BUCKET: litbuy-product-images-test
      PRODUCT_IMAGE_S3_ACCESS_KEY: litbuy_ci_minio_access
      PRODUCT_IMAGE_S3_SECRET_KEY: litbuy_ci_minio_secret_not_for_production
      PRODUCT_IMAGE_S3_FORCE_PATH_STYLE: "true"
      PRODUCT_IMAGE_UPLOAD_URL_TTL_SECONDS: "120"
      PRODUCT_IMAGE_READ_URL_TTL_SECONDS: "120"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Lint backend
        run: bun run lint

      - name: Check backend formatting
        run: bun run format:check

      - name: Typecheck backend
        run: bun run typecheck

      - name: Run backend unit tests
        run: bun run test

      - name: Run backend e2e tests
        run: bun run test:e2e

      - name: Validate Prisma schema
        run: bun run prisma:validate

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Build backend
        run: bun run build

  backend-integration:
    name: Backend integration
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_DB: litbuy_test
          POSTGRES_USER: litbuy
          POSTGRES_PASSWORD: litbuy_ci_integration_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U litbuy -d litbuy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        env:
          MINIO_ROOT_USER: litbuy_ci_minio_access
          MINIO_ROOT_PASSWORD: litbuy_ci_minio_secret_not_for_production
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      PORT: "3001"
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://litbuy:litbuy_ci_integration_password@localhost:5432/litbuy_test?schema=public
      REDIS_URL: redis://localhost:6379
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: silent
      SWAGGER_ENABLED: "false"
      TRUST_PROXY: "false"
      SERVER_REQUEST_TIMEOUT_MS: "60000"
      AUTH_ACCESS_TOKEN_SECRET: test_long_access_secret_for_ci_only
      AUTH_ACCESS_TOKEN_TTL_SECONDS: "600"
      AUTH_REFRESH_TOKEN_TTL_DAYS: "30"
      AUTH_REFRESH_TOKEN_PEPPER: test_long_refresh_pepper
      AUTH_VERIFICATION_TOKEN_PEPPER: test_long_verification_pepper
      AUTH_DEVICE_TOKEN_PEPPER: test_long_device_pepper
      AUTH_CSRF_TOKEN_PEPPER: test_long_csrf_pepper
      AUTH_IP_HASH_PEPPER: test_long_ip_hash_pepper
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: "30"
      AUTH_DEVICE_APPROVAL_TTL_MINUTES: "30"
      AUTH_MAX_ATTEMPTS: "5"
      AUTH_LOGIN_LOCK_MINUTES: "15"
      AUTH_REFRESH_COOKIE_NAME: litbuy_refresh
      AUTH_DEVICE_COOKIE_NAME: litbuy_device
      AUTH_CSRF_COOKIE_NAME: litbuy_csrf
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_COOKIE_DOMAIN: ""
      AUTH_EMAIL_DELIVERY_MODE: memory
      AUTH_2FA_RECOVERY_PEPPER: test_long_2fa_recovery_pepper_32_chars
      AUTH_STEP_UP_TOKEN_PEPPER: test_long_step_up_token_pepper_32_chars
      AUTH_PASSWORD_RESET_TTL_MINUTES: "30"
      AUTH_SMS_DELIVERY_MODE: memory
      AUTH_PHONE_VERIFICATION_TTL_MINUTES: "10"
      AUTH_PHONE_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_EMAIL_CHANGE_TTL_MINUTES: "30"
      AUTH_SENSITIVE_CHANGE_HOLD_HOURS: "48"
      AUTH_2FA_CODE_TTL_MINUTES: "10"
      AUTH_2FA_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_2FA_MAX_ATTEMPTS: "5"
      AUTH_2FA_RECOVERY_CODE_COUNT: "10"
      AUTH_STEP_UP_GRANT_TTL_MINUTES: "10"
      AUTH_STEP_UP_RESEND_COOLDOWN_SECONDS: "60"
      AUTH_STEP_UP_MAX_ATTEMPTS: "5"
      CURRENT_TERMS_VERSION: "2026-test"
      CURRENT_PRIVACY_VERSION: "2026-test"
      CURRENT_SELLER_AGREEMENT_VERSION: "2026-test"
      PUBLIC_FRONTEND_ORIGIN: http://localhost:3000
      PUBLIC_API_ORIGIN: http://localhost:3001
      AUTH_COOKIE_TOPOLOGY: same-host
      PRODUCT_IMAGE_S3_ENDPOINT: http://localhost:9000
      PRODUCT_IMAGE_S3_REGION: us-east-1
      PRODUCT_IMAGE_S3_BUCKET: litbuy-product-images-test
      PRODUCT_IMAGE_S3_ACCESS_KEY: litbuy_ci_minio_access
      PRODUCT_IMAGE_S3_SECRET_KEY: litbuy_ci_minio_secret_not_for_production
      PRODUCT_IMAGE_S3_FORCE_PATH_STYLE: "true"
      PRODUCT_IMAGE_UPLOAD_URL_TTL_SECONDS: "120"
      PRODUCT_IMAGE_READ_URL_TTL_SECONDS: "120"
      MINIO_ROOT_USER: litbuy_ci_minio_access
      MINIO_ROOT_PASSWORD: litbuy_ci_minio_secret_not_for_production
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Create and verify MinIO bucket
        run: |
          docker run --rm --network host \
            -e MC_HOST_local=http://$MINIO_ROOT_USER:$MINIO_ROOT_PASSWORD@localhost:9000 \
            minio/mc:RELEASE.2025-04-16T18-13-26Z \
            mb --ignore-existing local/$PRODUCT_IMAGE_S3_BUCKET
          docker run --rm --network host \
            -e MC_HOST_local=http://$MINIO_ROOT_USER:$MINIO_ROOT_PASSWORD@localhost:9000 \
            minio/mc:RELEASE.2025-04-16T18-13-26Z \
            stat local/$PRODUCT_IMAGE_S3_BUCKET

      - name: Deploy Prisma migrations
        run: bun run prisma:migrate:deploy

      - name: Run real infrastructure integration tests
        run: |
          set -o pipefail
          bun run test:integration 2>&1 | tee backend-integration.log

      - name: Upload backend integration failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-failure
          path: backend/backend-integration.log
          retention-days: 3

      - name: Verify staging files referenced by compose and runbook
        run: test -f ../docker-compose.staging.yml && test -f .env.staging.example && test -f .env.staging.local.example && test -f ../frontend/.env.staging.example

      - name: Validate staging compose config
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.staging.yml config

      - name: Build staging compose images
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.staging.yml build

      - name: Build backend for infrastructure smoke tests
        run: bun run build

      - name: Verify backend production entrypoint
        run: bun run check:prod-entrypoint

      - name: Start backend for infrastructure smoke tests
        run: |
          set -euo pipefail
          bun run start:prod > /tmp/litbuy-backend.log 2>&1 &
          echo "$!" > /tmp/litbuy-backend.pid
          sleep 1
          if ! kill -0 "$(cat /tmp/litbuy-backend.pid)" 2>/dev/null; then
            echo "Backend process exited before liveness. Expected entrypoint: dist/main.js"
            echo "--- dist files ---"
            find dist -maxdepth 5 -type f -print | sort || true
            echo "--- backend log ---"
            cat /tmp/litbuy-backend.log || true
            exit 1
          fi

      - name: Wait for backend liveness and readiness
        run: node ../scripts/wait-backend.mjs
        env:
          WAIT_BACKEND_BASE_URL: http://localhost:3001/api/v1
          WAIT_BACKEND_PID_FILE: /tmp/litbuy-backend.pid
          WAIT_BACKEND_LOG_FILE: /tmp/litbuy-backend.log
          WAIT_BACKEND_TIMEOUT_MS: "90000"

      - name: Run infrastructure smoke tests
        run: bun run smoke:infra
        env:
          INFRA_SMOKE_BASE_URL: http://localhost:3001/api/v1
          INFRA_SMOKE_ORIGIN: http://localhost:3000

      - name: Show backend smoke logs
        if: always()
        run: |
          if [ -f /tmp/litbuy-backend.log ]; then cat /tmp/litbuy-backend.log; else echo "No backend log file"; fi

      - name: Stop backend smoke process
        if: always()
        run: |
          if [ -f /tmp/litbuy-backend.pid ] && kill -0 "$(cat /tmp/litbuy-backend.pid)" 2>/dev/null; then
            kill "$(cat /tmp/litbuy-backend.pid)"
            wait "$(cat /tmp/litbuy-backend.pid)" 2>/dev/null || true
          fi
