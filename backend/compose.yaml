services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litbuy_dev}
      POSTGRES_USER: ${POSTGRES_USER:-litbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litbuy_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-litbuy} -d ${POSTGRES_DB:-litbuy_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.2-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-litbuy_test_access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-litbuy_test_secret_only}
    ports: ['${MINIO_PORT:-9000}:9000', '${MINIO_CONSOLE_PORT:-9001}:9001']
    volumes: [minio_data:/data]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live >/dev/null']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc mb --ignore-existing local/$$PRODUCT_IMAGE_S3_BUCKET',
      ]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-litbuy_test_access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-litbuy_test_secret_only}
      PRODUCT_IMAGE_S3_BUCKET: ${PRODUCT_IMAGE_S3_BUCKET:-litbuy-product-images}

volumes:
  postgres_data:
  redis_data:
  minio_data:
